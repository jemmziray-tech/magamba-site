<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gallery - Magamba High School</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header><h1>Gallery</h1></header>
  <nav>
  <a href="index.html">Home</a>
  <a href="about.html">About Us</a>
  <a href="academics.html">Academics</a>
  <a href="gallery.html">Gallery</a>
  <a href="announcements.html">Announcements</a>
  <a href="results.html">Results</a>
  <a href="contact.html">Contact</a>
</nav>
  <main>
    <h2>Gallery</h2>
    <div class="gallery">
      <img src="photo1.webp" alt="School Event 1">
      <img src="photo2.webp" alt="School Event 2">
      <img src="photo3.webp" alt="School Event 3">
      <img src="photo4.webp" alt="School Event 4">
      <img src="photo5.jpeg" alt="School Event 5">
      <img src="photo6.jpeg" alt="School Event 6">
    </div>
  </main>
  <footer><p>&copy; 2026 Magamba High School.</p></footer>
  <script>
  let currentIndex = 0;
  let images = [];

  document.addEventListener("DOMContentLoaded", function() {
    images = Array.from(document.querySelectorAll("img"));
    const modal = document.getElementById("imageModal");
    const modalImg = document.getElementById("modalImage");
    const captionText = document.getElementById("caption");

    images.forEach((img, index) => {
      img.addEventListener("click", function() {
        currentIndex = index;
        modal.style.display = "block";
        modalImg.src = this.src;
        captionText.innerHTML = this.alt;
      });
    });

    window.closeModal = function() {
      modal.style.display = "none";
    };

    window.changeImage = function(direction) {
      currentIndex += direction;
      if (currentIndex < 0) currentIndex = images.length - 1;
      if (currentIndex >= images.length) currentIndex = 0;
      modalImg.src = images[currentIndex].src;
      captionText.innerHTML = images[currentIndex].alt;
    };
  });
</script>
</body>

</html>
