<html lang="en">

  <meta charset="UTF-8">
  <title>Gallery - Magamba High School</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Filter buttons styling */
    .filter-buttons {
      text-align: center;
      margin: 20px 0;
      flex-wrap: wrap;
    }
    .filter-buttons button {
      background: #FFD700;
      color: #006400;
      border: none;
      padding: 10px 18px;
      margin: 5px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.3s, background 0.3s;
    }
    .filter-buttons button:hover {
      transform: scale(1.1);
      background: #006400;
      color: #FFD700;
    }
    .gallery-group { display: none; }
    .gallery-group.active { display: block; }

    /* Responsive gallery layout */
    .gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
    }
    .gallery img {
      width: 220px;
      max-width: 100%;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      cursor: pointer;
      transition: transform 0.3s;
    }
    .gallery img:hover {
      transform: scale(1.05);
    }

    /* Mobile adjustments */
    @media only screen and (max-width: 600px) {
      .filter-buttons {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .filter-buttons button {
        width: 90%;
        margin: 8px 0;
      }
      .gallery img {
        width: 100%;
        max-width: 95%;
      }
    }
  </style>
</head>
<body>
  <header><h1>Gallery</h1></header>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="academics.html">Academics</a>
    <a href="gallery.html" class="active">Gallery</a>
    <a href="announcements.html">Announcements</a>
    <a href="results.html">Results</a>
    <a href="contact.html">Contact</a>
  </nav>

  <main>
    <h2>Gallery</h2>

    <!-- Filter Buttons -->
    <div class="filter-buttons">
      <button onclick="showGroup('2024')">Show 2024</button>
      <button onclick="showGroup('2025')">Show 2025</button>
      <button onclick="showGroup('2026')">Show 2026</button>
      <button onclick="showGroup('teachers')">Show Teachers</button>
      <button onclick="showGroup('all')">Show All</button>
    </div>

    <!-- FM6 Leavers 2024 -->
    <section class="gallery-group" data-group="2024">
      <h3>FM6 Leavers 2024</h3>
      <div class="gallery">
        <img src="photo1.webp" alt="Class of 2024 celebrating together with teachers">

      </div>
    </section>

    <!-- FM6 Leavers 2025 -->
    <section class="gallery-group" data-group="2025">
      <h3>FM6 Leavers 2025</h3>
      <div class="gallery">
        <img src="photo5.jpeg" alt="Class of 2025 graduation ceremony">
        <img src="photo6.jpeg" alt="Class of 2025 graduation ceremony">
      </div>
    </section>

    <!-- FM6 Leavers 2026 -->
    <section class="gallery-group" data-group="2026">
      <h3>FM6 Leavers 2026</h3>
      <div class="gallery">
        <img src="C1.jpeg" alt="Class of 2026 graduation day">
        <img src="C2.jpeg" alt="Class of 2026 graduation day">
        <img src="C3.jpeg" alt="Class of 2026 graduation day">
      </div>
    </section>

    <!-- Teachers -->
    <section class="gallery-group" data-group="teachers">
      <h3>Teachers</h3>
      <div class="gallery">
        <img src="photo2.webp" alt="Teachers of Magamba High School">
      </div>
    </section>
  </main>

  <footer><p>&copy; 2026 Magamba High School.</p></footer>

  <!-- Global Image Modal -->
  <div id="imageModal" class="modal">
    <span class="close" onclick="closeModal()">&times;</span>
    <img class="modal-content" id="modalImage">
    <div id="caption"></div>
    <span class="prev" onclick="changeImage(-1)">&#10094;</span>
    <span class="next" onclick="changeImage(1)">&#10095;</span>
  </div>

  <!-- JavaScript -->
  <script>
    let currentIndex = 0;
    let images = [];

    document.addEventListener("DOMContentLoaded", function() {
      images = Array.from(document.querySelectorAll(".gallery img"));
      const modal = document.getElementById("imageModal");
      const modalImg = document.getElementById("modalImage");
      const captionText = document.getElementById("caption");

      // Open modal on image click
      images.forEach((img, index) => {
        img.addEventListener("click", function() {
          currentIndex = index;
          modal.style.display = "block";
          modalImg.src = this.src;
          captionText.innerHTML = this.alt; // short description
        });
      });

      // Close modal
      window.closeModal = function() {
        modal.style.display = "none";
      };

      // Change image with arrows
      window.changeImage = function(direction) {
        currentIndex += direction;
        if (currentIndex < 0) currentIndex = images.length - 1;
        if (currentIndex >= images.length) currentIndex = 0;
        modalImg.src = images[currentIndex].src;
        captionText.innerHTML = images[currentIndex].alt;
      };

      // Close modal when clicking outside image
      window.onclick = function(event) {
        if (event.target === modal) {
          modal.style.display = "none";
        }
      };

      // Swipe gestures for mobile
      let startX = 0;
      modalImg.addEventListener("touchstart", e => {
        startX = e.touches[0].clientX;
      });
      modalImg.addEventListener("touchend", e => {
        let endX = e.changedTouches[0].clientX;
        if (endX - startX > 50) changeImage(-1); // swipe right
        if (startX - endX > 50) changeImage(1);  // swipe left
      });

      // Show groups filter
      window.showGroup = function(group) {
        const groups = document.querySelectorAll(".gallery-group");
        groups.forEach(section => {
          if (group === "all" || section.dataset.group === group) {
            section.classList.add("active");
          } else {
            section.classList.remove("active");
          }
        });
      };

      // Default: show all
      showGroup("all");
    });
  </script>
</body>
</html>
